<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Pipeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#0f0f11;--surface:#17171a;--surface2:#1e1e22;--surface3:#26262c;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8e8ec;--text2:#9090a0;--text3:#5a5a6a;--accent:#6c8eff;--accent-dim:rgba(108,142,255,0.15);--green:#3ecf8e;--green-dim:rgba(62,207,142,0.12);--amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);--red:#f25c54;--red-dim:rgba(242,92,84,0.12);--purple:#b57bee;--purple-dim:rgba(181,123,238,0.12);--radius:10px;--radius-lg:14px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
  .auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:40px}
  .auth-logo{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase}
  .auth-title{font-size:32px;font-weight:300;letter-spacing:-0.5px}
  .auth-sub{color:var(--text2);font-size:14px;max-width:340px;text-align:center;line-height:1.6}
  .auth-btn{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:12px 24px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;margin-top:8px}
  .auth-btn:hover{background:var(--surface3);border-color:var(--accent)}
  .auth-btn:disabled{opacity:0.5;cursor:not-allowed}
  .auth-error{color:var(--red);font-size:13px;max-width:340px;text-align:center;display:none;margin-top:8px}
  .app{display:none;flex-direction:column;min-height:100vh}
  .app.visible{display:flex}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
  .logo{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:2px;background:var(--surface)}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:all 0.1s}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--accent)}
  .nav-item .nbadge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--red-dim);color:var(--red);font-weight:500}
  .nav-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;padding:12px 12px 4px;margin-top:8px}
  .content{flex:1;overflow-y:auto;padding:24px}
  .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.1s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--surface3);border-color:var(--border2)}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{opacity:0.88}
  .btn.sm{padding:4px 10px;font-size:12px}
  .btn.danger{color:var(--red);border-color:rgba(242,92,84,0.3)}
  .btn.danger:hover{background:var(--red-dim)}
  .btn.ghost{border-color:transparent}
  .btn.ghost:hover{background:var(--surface2);border-color:var(--border)}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:24px}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
  .metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
  .metric-val{font-size:28px;font-weight:300;letter-spacing:-1px;line-height:1}
  .metric-val.danger{color:var(--red)}
  .alert{border-radius:var(--radius);padding:12px 16px;margin-bottom:12px}
  .alert.danger{background:var(--red-dim);border:1px solid rgba(242,92,84,0.2)}
  .alert.warn{background:var(--amber-dim);border:1px solid rgba(245,166,35,0.2)}
  .alert-title{font-size:12px;font-weight:600;margin-bottom:8px}
  .alert.danger .alert-title{color:var(--red)}
  .alert.warn .alert-title{color:var(--amber)}
  .alert-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
  .alert-row:last-child{border-bottom:none}
  .pipeline{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
  .stage-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;min-height:100px}
  .stage-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .stage-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3)}
  .stage-count{font-size:11px;background:var(--surface2);border-radius:8px;padding:1px 7px;color:var(--text2)}
  .pcard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px;cursor:pointer;transition:all 0.1s}
  .pcard:hover{border-color:var(--border2);background:var(--surface3)}
  .pcard.stale-warn{border-left:3px solid var(--amber);border-radius:0 var(--radius) var(--radius) 0}
  .pcard.stale-over{border-left:3px solid var(--red);border-radius:0 var(--radius) var(--radius) 0}
  .pcard-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard-sub{font-size:11px;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard-tags{display:flex;gap:4px;flex-wrap:wrap}
  .tag{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:500;white-space:nowrap}
  .tag.green{background:var(--green-dim);color:var(--green)}
  .tag.amber{background:var(--amber-dim);color:var(--amber)}
  .tag.red{background:var(--red-dim);color:var(--red)}
  .tag.purple{background:var(--purple-dim);color:var(--purple)}
  .tag.blue{background:var(--accent-dim);color:var(--accent)}
  .tag.gray{background:var(--surface3);color:var(--text2)}
  .avatar{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600}
  .list-row{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:all 0.1s}
  .list-row:hover{border-color:var(--border2);background:var(--surface2)}
  .list-row.stale-warn{border-left:3px solid var(--amber);border-radius:0 var(--radius) var(--radius) 0}
  .list-row.stale-over{border-left:3px solid var(--red);border-radius:0 var(--radius) var(--radius) 0}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:1000;overflow-y:auto}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:580px;padding:24px}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-title{font-size:16px;font-weight:500}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field select option{background:var(--surface2)}
  .field textarea{resize:vertical;min-height:80px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .person-hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .person-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .interview-track{display:flex;overflow-x:auto;margin-bottom:14px}
  .ist{padding:6px 12px;font-size:11px;border:1px solid var(--border);cursor:pointer;background:var(--surface2);color:var(--text2);white-space:nowrap;transition:all 0.1s;font-family:'DM Sans',sans-serif}
  .ist:first-child{border-radius:var(--radius) 0 0 var(--radius)}
  .ist:last-child{border-radius:0 var(--radius) var(--radius) 0}
  .ist:not(:first-child){border-left:none}
  .ist.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:10px}
  .log-entry{padding:10px 0;border-bottom:1px solid var(--border)}
  .log-entry:last-child{border-bottom:none}
  .log-entry-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .log-text{font-size:13px;color:var(--text2);line-height:1.5}
  .log-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
  .lt-call{background:var(--green-dim);color:var(--green)}
  .lt-email{background:var(--accent-dim);color:var(--accent)}
  .lt-meeting{background:var(--purple-dim);color:var(--purple)}
  .lt-note{background:var(--surface3);color:var(--text2)}
  .lt-linkedin{background:rgba(0,119,181,0.15);color:#5aadff}
  .thresh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
  .thresh-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
  .thresh-item label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px}
  .thresh-item input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:14px;text-align:center}
  .stale-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer}
  .stale-row:hover{border-color:var(--border2)}
  .stale-bar-bg{height:3px;background:var(--surface3);border-radius:2px;margin-top:6px;overflow:hidden}
  .stale-bar{height:100%;border-radius:2px}
  .sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
  .sync-dot.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
  @media(max-width:900px){.sidebar{display:none}.pipeline{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-logo">Executive Pipeline</div>
  <div class="auth-title">Your deal board.</div>
  <div class="auth-sub">Sign in with Google to load your pipeline from Drive and sync Gmail interactions automatically.</div>
  <button class="auth-btn" id="signInBtn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
  <div class="auth-error" id="authError"></div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <span class="logo">Executive Pipeline</span>
    <div class="topbar-right">
      <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncText">Ready</span></div>
      <button class="btn sm" onclick="syncGmail()" id="gmailBtn">Sync Gmail</button>
      <button class="btn sm primary" onclick="openAdd()">+ Add person</button>
      <button class="btn sm ghost" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <button class="nav-item active" id="nav-pipeline" onclick="setView('pipeline')">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Pipeline
      </button>
      <button class="nav-item" id="nav-list" onclick="setView('list')">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        All people
      </button>
      <button class="nav-item" id="nav-stale" onclick="setView('stale')">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Needs action
        <span class="nbadge" id="staleBadge" style="display:none">0</span>
      </button>
      <div class="nav-section">Settings</div>
      <button class="nav-item" id="nav-thresholds" onclick="setView('thresholds')">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
        Thresholds
      </button>
      <button class="nav-item" onclick="exportCSV()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<script>
const CLIENT_ID='302975737653-1rk34mimder1jvdm0vr45vmcs3ri1qij.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.readonly';
const FILE_NAME='executive_pipeline.json';
const STAGES=['Target','Outreach','Scheduled','Talked','In play','Offer','Passed'];
const INTERVIEW_STAGES=['Screening','Considering','Verbal interest','Offer extended','Background','Accepted'];
const LOG_TYPES=['Call','Email','Meeting','LinkedIn','Note'];
const DEFAULT_THRESHOLDS={Target:14,Outreach:7,Scheduled:5,Talked:7,'In play':5,Offer:7,Passed:9999};
const AV_COLORS=[['#1a2a4a','#6c8eff'],['#1a3a2a','#3ecf8e'],['#3a1a2a','#b57bee'],['#3a2a1a','#f5a623'],['#2a1a3a','#f25c54'],['#1a3a3a','#5aadff']];

let accessToken=null,driveFileId=null,tokenClient=null,draft=null;
let state={people:[],view:'pipeline',search:'',sortList:'name',showStaleOnly:false,logType:'Note',thresholds:{...DEFAULT_THRESHOLDS}};

function initGoogle(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:handleTokenResponse,
    error_callback:handleTokenError
  });
}
function handleTokenResponse(resp){
  if(resp.error){showAuthError('Sign-in failed: '+resp.error);return;}
  accessToken=resp.access_token;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').classList.add('visible');
  loadFromDrive();
}
function handleTokenError(err){showAuthError('Sign-in error: '+(err.message||err.type||'Unknown'));}
function showAuthError(msg){const el=document.getElementById('authError');el.textContent=msg;el.style.display='block';document.getElementById('signInBtn').disabled=false;}
function signIn(){document.getElementById('signInBtn').disabled=true;document.getElementById('authError').style.display='none';tokenClient.requestAccessToken({prompt:'consent'});}
function signOut(){if(accessToken)google.accounts.oauth2.revoke(accessToken,()=>{});accessToken=null;driveFileId=null;state.people=[];document.getElementById('app').classList.remove('visible');document.getElementById('authScreen').style.display='flex';document.getElementById('signInBtn').disabled=false;}

async function apiRequest(url,opts={}){
  const res=await fetch(url,{...opts,headers:{Authorization:`Bearer ${accessToken}`,  ...(opts.headers||{})}});
  if(res.status===401){tokenClient.requestAccessToken({prompt:''});throw new Error('Token expired');}
  if(!res.ok)throw new Error(`API ${res.status}`);
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():res.text();
}
async function findOrCreateFile(){
  const list=await apiRequest(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'+and+trashed=false&fields=files(id,name)&spaces=drive`);
  if(list.files&&list.files.length>0){driveFileId=list.files[0].id;return;}
  const meta=new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'});
  const content=new Blob([JSON.stringify({people:[],thresholds:DEFAULT_THRESHOLDS})],{type:'application/json'});
  const form=new FormData();form.append('metadata',meta);form.append('file',content);
  const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:form});
  const data=await res.json();driveFileId=data.id;
}
async function loadFromDrive(){
  setSyncStatus('syncing','Loading…');
  try{
    await findOrCreateFile();
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
    const data=await res.json();
    state.people=data.people||[];
    state.thresholds={...DEFAULT_THRESHOLDS,...(data.thresholds||{})};
    setSyncStatus('ok',`Loaded · ${state.people.length} people`);
    render();
  }catch(e){setSyncStatus('error','Load failed: '+e.message);render();}
}
async function saveToDrive(){
  if(!driveFileId)return;
  setSyncStatus('syncing','Saving…');
  try{
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({people:state.people,thresholds:state.thresholds})});
    setSyncStatus('ok','Saved · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  }catch(e){setSyncStatus('error','Save failed');}
}

async function syncGmail(){
  if(!accessToken)return;
  const btn=document.getElementById('gmailBtn');btn.disabled=true;
  setSyncStatus('syncing','Scanning Gmail…');
  try{
    const cutoff=Math.floor(Date.now()/1000)-(90*86400);let newEntries=0;
    for(const person of state.people){
      if(!person.email)continue;
      const q=encodeURIComponent(`(from:${person.email} OR to:${person.email}) after:${cutoff}`);
      const res=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${q}&maxResults=25`,{headers:{Authorization:`Bearer ${accessToken}`}});
      const data=await res.json();
      if(!data.messages)continue;
      for(const msg of data.messages){
        if((person.log||[]).find(l=>l.gmailId===msg.id))continue;
        const mRes=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`,{headers:{Authorization:`Bearer ${accessToken}`}});
        const mData=await mRes.json();
        const hdrs=mData.payload?.headers||[];
        const subject=hdrs.find(h=>h.name==='Subject')?.value||'(no subject)';
        const from=hdrs.find(h=>h.name==='From')?.value||'';
        const dateStr=hdrs.find(h=>h.name==='Date')?.value;
        const date=dateStr?new Date(dateStr).toISOString():new Date().toISOString();
        const dir=from.toLowerCase().includes(person.email.toLowerCase())?'Received':'Sent';
        if(!person.log)person.log=[];
        person.log.push({id:'g_'+msg.id,gmailId:msg.id,type:'Email',text:`[${dir}] ${subject}`,date,auto:true});
        newEntries++;
        if(!person.lastContact||new Date(date)>new Date(person.lastContact))person.lastContact=date;
      }
      if(person.log)person.log.sort((a,b)=>new Date(b.date)-new Date(a.date));
    }
    await saveToDrive();
    setSyncStatus('ok',`Gmail synced · +${newEntries} entries`);
    render();if(draft)renderModal();
  }catch(e){setSyncStatus('error','Gmail sync failed');console.error(e);}
  btn.disabled=false;
}

function setSyncStatus(type,text){const dot=document.getElementById('syncDot');const txt=document.getElementById('syncText');if(!dot)return;dot.className='sync-dot'+(type==='syncing'?' syncing':type==='error'?' error':'');txt.textContent=text;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function avStyle(n,size=40){const i=(n||'?').charCodeAt(0)%AV_COLORS.length;return `background:${AV_COLORS[i][0]};color:${AV_COLORS[i][1]};width:${size}px;height:${size}px;font-size:${Math.round(size*0.35)}px`;}
function daysAgo(ds){if(!ds)return null;return Math.floor((Date.now()-new Date(ds))/86400000);}
function fmt(ds){if(!ds)return'—';return new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtShort(ds){if(!ds)return'';return new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function newPerson(){return{id:Date.now()+'',name:'',title:'',company:'',email:'',linkedin:'',phone:'',stage:'Target',stageEnteredAt:new Date().toISOString(),interviewStage:'',followUp:false,priority:'',lastContact:null,nextStepNote:'',nextStepDate:'',log:[],notes:'',added:new Date().toISOString()};}
function stageAge(p){if(!p.stageEnteredAt)return null;return Math.floor((Date.now()-new Date(p.stageEnteredAt))/86400000);}
function staleStatus(p){if(p.stage==='Passed')return'ok';const days=stageAge(p);if(days===null)return'ok';const thresh=state.thresholds[p.stage]||14;if(days>=thresh)return'over';if(days>=Math.round(thresh*0.7))return'warn';return'ok';}
function stageTag(p){const days=stageAge(p);if(days===null)return'';const ss=staleStatus(p);const cls=ss==='over'?'red':ss==='warn'?'amber':'green';return`<span class="tag ${cls}">${days===0?'Today':days+'d'} in stage</span>`;}
function getStale(){return state.people.filter(p=>p.stage!=='Passed'&&staleStatus(p)==='over');}
function getWarn(){return state.people.filter(p=>p.stage!=='Passed'&&staleStatus(p)==='warn');}
function getNextDue(){return state.people.filter(p=>p.nextStepDate&&new Date(p.nextStepDate)<new Date()&&p.stage!=='Passed');}

function setView(v){state.view=v;document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));const el=document.getElementById('nav-'+v);if(el)el.classList.add('active');render();}

function render(){
  const stale=getStale(),warned=getWarn(),nextDue=getNextDue();
  const badge=document.getElementById('staleBadge');
  const total=stale.length+warned.length;
  if(badge){badge.style.display=total>0?'':'none';badge.textContent=total;}
  const byStage={};STAGES.forEach(s=>byStage[s]=[]);
  state.people.forEach(p=>byStage[p.stage]&&byStage[p.stage].push(p));
  const active=state.people.filter(p=>p.stage!=='Passed');
  const inPlay=(byStage['In play']||[]).length+(byStage['Offer']||[]).length;
  const metrics=`<div class="metrics">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-val">${state.people.length}</div></div>
    <div class="metric"><div class="metric-label">Active</div><div class="metric-val">${active.length}</div></div>
    <div class="metric"><div class="metric-label">In play</div><div class="metric-val">${inPlay}</div></div>
    <div class="metric"><div class="metric-label">Stale</div><div class="metric-val ${stale.length>0?'danger':''}">${stale.length}</div></div>
    <div class="metric"><div class="metric-label">Next due</div><div class="metric-val ${nextDue.length>0?'danger':''}">${nextDue.length}</div></div>
  </div>`;
  const alerts=buildAlerts(stale,warned,nextDue);
  let body='';
  if(state.view==='pipeline')body=buildPipeline(byStage);
  else if(state.view==='list')body=buildList();
  else if(state.view==='stale')body=buildStaleView(stale,warned);
  else if(state.view==='thresholds')body=buildThresholds();
  document.getElementById('content').innerHTML=state.view==='thresholds'?body:metrics+alerts+body;
}

function buildAlerts(stale,warned,nextDue){
  let h='';
  if(stale.length)h+=`<div class="alert danger"><div class="alert-title">Stale — past threshold (${stale.length})</div>${stale.map(p=>`<div class="alert-row"><span style="font-size:13px;font-weight:500">${esc(p.name)}</span><span style="font-size:11px;color:var(--text2)">${esc(p.stage)} · ${stageAge(p)}d</span><button class="btn sm" onclick="openEdit('${p.id}')">Open →</button></div>`).join('')}</div>`;
  if(warned.length)h+=`<div class="alert warn"><div class="alert-title">Getting stale — act soon (${warned.length})</div>${warned.map(p=>`<div class="alert-row"><span style="font-size:13px;font-weight:500">${esc(p.name)}</span><span style="font-size:11px;color:var(--text2)">${esc(p.stage)} · ${stageAge(p)}d / ${state.thresholds[p.stage]}d</span><button class="btn sm" onclick="openEdit('${p.id}')">Open →</button></div>`).join('')}</div>`;
  if(nextDue.length)h+=`<div class="alert danger"><div class="alert-title">Overdue next steps (${nextDue.length})</div>${nextDue.map(p=>`<div class="alert-row"><span style="font-size:13px;font-weight:500">${esc(p.name)}</span><span style="font-size:11px;color:var(--text2)">Due ${fmtShort(p.nextStepDate)} · ${esc(p.nextStepNote)}</span><button class="btn sm" onclick="openEdit('${p.id}')">Open →</button></div>`).join('')}</div>`;
  return h;
}

function buildPipeline(byStage){
  let h='<div class="pipeline">';
  STAGES.forEach(s=>{
    const cards=byStage[s]||[];
    h+=`<div class="stage-col"><div class="stage-head"><span class="stage-name">${s}</span><span class="stage-count">${cards.length}</span></div>`;
    if(!cards.length)h+=`<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0">—</div>`;
    cards.forEach(p=>{const ss=staleStatus(p);h+=`<div class="pcard${ss==='over'?' stale-over':ss==='warn'?' stale-warn':''}" onclick="openEdit('${p.id}')"><div class="pcard-name">${esc(p.name)}</div><div class="pcard-sub">${esc([p.title,p.company].filter(Boolean).join(' · '))}</div><div class="pcard-tags">${stageTag(p)}${p.followUp?'<span class="tag amber">Follow up</span>':''}${p.priority==='hot'?'<span class="tag red">Hot</span>':''}${p.priority==='cold'?'<span class="tag blue">Cold</span>':''}${p.interviewStage&&s==='In play'?`<span class="tag purple">${esc(p.interviewStage)}</span>`:''}</div></div>`;});
    h+='</div>';
  });
  return h+'</div>';
}

function buildList(){
  let people=[...state.people];
  if(state.search){const q=state.search.toLowerCase();people=people.filter(p=>p.name.toLowerCase().includes(q)||(p.company||'').toLowerCase().includes(q)||(p.title||'').toLowerCase().includes(q));}
  if(state.showStaleOnly)people=people.filter(p=>staleStatus(p)!=='ok'&&p.stage!=='Passed');
  if(state.sortList==='name')people.sort((a,b)=>a.name.localeCompare(b.name));
  else if(state.sortList==='stage')people.sort((a,b)=>STAGES.indexOf(a.stage)-STAGES.indexOf(b.stage));
  else if(state.sortList==='stale')people.sort((a,b)=>{const o={over:0,warn:1,ok:2};return o[staleStatus(a)]-o[staleStatus(b)];});
  else if(state.sortList==='contact')people.sort((a,b)=>{if(!a.lastContact)return 1;if(!b.lastContact)return -1;return new Date(b.lastContact)-new Date(a.lastContact);});
  let h=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <input style="flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px" type="text" placeholder="Search name, company, title…" value="${esc(state.search)}" oninput="state.search=this.value;render()">
    <button class="btn sm ${state.sortList==='name'?'primary':''}" onclick="state.sortList='name';render()">Name</button>
    <button class="btn sm ${state.sortList==='stage'?'primary':''}" onclick="state.sortList='stage';render()">Stage</button>
    <button class="btn sm ${state.sortList==='stale'?'primary':''}" onclick="state.sortList='stale';render()">Staleness</button>
    <button class="btn sm ${state.sortList==='contact'?'primary':''}" onclick="state.sortList='contact';render()">Last contact</button>
    <button class="btn sm ${state.showStaleOnly?'primary':''}" onclick="state.showStaleOnly=!state.showStaleOnly;render()">Stale only</button>
  </div>`;
  if(!people.length)return h+'<div class="empty">No people found</div>';
  people.forEach(p=>{const ss=staleStatus(p);const da=daysAgo(p.lastContact);h+=`<div class="list-row${ss==='over'?' stale-over':ss==='warn'?' stale-warn':''}" onclick="openEdit('${p.id}')"><div class="avatar" style="${avStyle(p.name,38)}">${initials(p.name||'?')}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:14px;font-weight:500">${esc(p.name)}</span><span class="tag gray">${esc(p.stage)}${p.interviewStage&&p.stage==='In play'?' · '+esc(p.interviewStage):''}</span>${stageTag(p)}${p.followUp?'<span class="tag amber">Follow up</span>':''}${p.priority==='hot'?'<span class="tag red">Hot</span>':''}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${esc([p.title,p.company].filter(Boolean).join(' · '))}</div></div><div style="font-size:11px;color:var(--text3);text-align:right;white-space:nowrap">${da===null?'No contact':da===0?'Today':da===1?'Yesterday':da+'d ago'}</div></div>`;});
  return h;
}

function buildStaleView(stale,warned){
  const all=[...stale,...warned.filter(p=>!stale.includes(p))];
  let h=`<div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">People needing attention, sorted by urgency.</div>`;
  if(!all.length)return h+'<div class="empty">No one is stale. Good cadence.</div>';
  all.forEach(p=>{const days=stageAge(p)||0;const thresh=state.thresholds[p.stage]||14;const pct=Math.min(100,Math.round(days/thresh*100));const ss=staleStatus(p);const bc=ss==='over'?'var(--red)':'var(--amber)';h+=`<div class="stale-row" onclick="openEdit('${p.id}')"><div class="avatar" style="${avStyle(p.name,36)}">${initials(p.name||'?')}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-weight:500">${esc(p.name)}</span><span class="tag gray">${esc(p.stage)}</span><span class="tag ${ss==='over'?'red':'amber'}">${days}d / ${thresh}d</span>${p.nextStepNote?`<span style="font-size:11px;color:var(--text3)">${esc(p.nextStepNote)}</span>`:''}</div><div class="stale-bar-bg"><div class="stale-bar" style="width:${pct}%;background:${bc}"></div></div></div><button class="btn sm">Open →</button></div>`;});
  return h;
}

function buildThresholds(){
  let h=`<div style="font-size:13px;color:var(--text2);margin-bottom:20px;max-width:500px;line-height:1.6">Days before a person turns amber (approaching) or red (overdue) in each stage. Amber triggers at 70% of the threshold.</div><div class="thresh-grid">`;
  STAGES.filter(s=>s!=='Passed').forEach(s=>{h+=`<div class="thresh-item"><label>${s}</label><input type="number" min="1" max="365" value="${state.thresholds[s]||14}" onchange="state.thresholds['${s}']=Math.max(1,parseInt(this.value)||14);saveToDrive();render()"></div>`;});
  h+=`</div><button class="btn primary" onclick="saveToDrive()">Save thresholds</button>`;
  return h;
}

function openAdd(){draft=newPerson();state.logType='Note';showModal();}
function openEdit(id){const p=state.people.find(x=>x.id===id);if(p){draft=JSON.parse(JSON.stringify(p));state.logType='Note';showModal();}}
function closeModal(){document.getElementById('modalOverlay').style.display='none';draft=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function showModal(){document.getElementById('modalOverlay').style.display='flex';renderModal();}

function renderModal(){
  if(!draft)return;
  const isNew=!state.people.find(p=>p.id===draft.id);
  const isInPlay=draft.stage==='In play'||draft.stage==='Offer';
  const sa=stageAge(draft);const ss=staleStatus(draft);
  const saTag=sa!==null?`<span class="tag ${ss==='over'?'red':ss==='warn'?'amber':'green'}">${sa===0?'Today':sa+'d'} in ${esc(draft.stage)}</span>`:'';
  const logHtml=(draft.log||[]).length?(draft.log||[]).map(l=>`<div class="log-entry"><div class="log-entry-head"><div style="display:flex;align-items:center;gap:8px"><span class="log-badge lt-${l.type.toLowerCase()}">${l.type}${l.auto?' · auto':''}</span><span style="font-size:11px;color:var(--text3)">${fmt(l.date)}</span></div>${!l.auto?`<button class="btn sm danger" onclick="deleteLog('${l.id}')">×</button>`:''}</div><div class="log-text">${esc(l.text)}</div></div>`).join(''):'<div class="empty" style="padding:16px 0">No activity yet</div>';

  document.getElementById('modal').innerHTML=`
    <div class="modal-header"><div class="modal-title">${isNew?'Add person':'Edit person'}</div><button class="btn sm ghost" onclick="closeModal()">✕</button></div>
    ${!isNew?`<div class="person-hero"><div class="avatar" style="${avStyle(draft.name||'?',48)}">${initials(draft.name||'?')}</div><div style="flex:1"><div style="font-size:20px;font-weight:500;letter-spacing:-0.3px">${esc(draft.name)||'Unnamed'}</div><div style="font-size:13px;color:var(--text2);margin-top:2px">${esc([draft.title,draft.company].filter(Boolean).join(' · '))}</div><div class="person-flags">${saTag}<button class="btn sm ${draft.followUp?'primary':''}" onclick="draftToggle('followUp')">Follow-up${draft.followUp?' ✓':''}</button><button class="btn sm ${draft.priority==='hot'?'primary':''}" onclick="draftTogglePriority('hot')">Hot</button><button class="btn sm ${draft.priority==='cold'?'primary':''}" onclick="draftTogglePriority('cold')">Cold</button></div></div></div>`:''}
    <div class="field-row"><div class="field"><label>Name *</label><input value="${esc(draft.name)}" oninput="draft.name=this.value" placeholder="Full name"></div><div class="field"><label>Company</label><input value="${esc(draft.company)}" oninput="draft.company=this.value" placeholder="Company"></div></div>
    <div class="field-row"><div class="field"><label>Title</label><input value="${esc(draft.title)}" oninput="draft.title=this.value" placeholder="CEO, CHRO…"></div><div class="field"><label>Email</label><input type="email" value="${esc(draft.email)}" oninput="draft.email=this.value" placeholder="email@company.com"></div></div>
    <div class="field-row"><div class="field"><label>LinkedIn</label><input value="${esc(draft.linkedin)}" oninput="draft.linkedin=this.value" placeholder="linkedin.com/in/…"></div><div class="field"><label>Phone</label><input type="tel" value="${esc(draft.phone)}" oninput="draft.phone=this.value" placeholder="+1 312…"></div></div>
    <div class="field-row"><div class="field"><label>Pipeline stage</label><select onchange="draftSetStage(this.value)">${STAGES.map(s=>`<option value="${s}"${draft.stage===s?' selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Priority</label><select onchange="draft.priority=this.value;renderModal()"><option value=""${!draft.priority?' selected':''}>Normal</option><option value="hot"${draft.priority==='hot'?' selected':''}>Hot</option><option value="cold"${draft.priority==='cold'?' selected':''}>Cold</option></select></div></div>
    ${isInPlay?`<div class="field"><label>Interview stage</label><div class="interview-track">${INTERVIEW_STAGES.map(s=>`<button class="ist${draft.interviewStage===s?' active':''}" onclick="draft.interviewStage='${s}';renderModal()">${s}</button>`).join('')}</div></div>`:''}
    <div class="field-row"><div class="field"><label>Next step</label><input value="${esc(draft.nextStepNote)}" oninput="draft.nextStepNote=this.value" placeholder="What needs to happen next"></div><div class="field"><label>Due date</label><input type="date" value="${draft.nextStepDate?draft.nextStepDate.slice(0,10):''}" oninput="draft.nextStepDate=this.value"></div></div>
    <div class="field"><label>Notes</label><textarea oninput="draft.notes=this.value" placeholder="Background, context, talking points…">${esc(draft.notes)}</textarea></div>
    <div class="modal-actions"><div>${!isNew?`<button class="btn danger" onclick="confirmDelete('${draft.id}')">Delete person</button>`:''}</div><div style="display:flex;gap:8px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="savePerson()">Save</button></div></div>
    ${!isNew?`<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)"><div class="section-label">Activity log</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"><div style="display:flex;gap:6px;flex-wrap:wrap">${LOG_TYPES.map(t=>`<button class="btn sm ${state.logType===t?'primary':''}" onclick="state.logType='${t}';renderModal()">${t}</button>`).join('')}</div><div style="display:flex;gap:8px;flex-wrap:wrap"><input id="logText" type="text" placeholder="What happened or was discussed…" style="flex:1;min-width:160px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px"><input id="logDate" type="date" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px"></div><button class="btn sm primary" onclick="submitLog()">Add entry</button></div><div>${logHtml}</div></div>`:''}
  `;
  const ld=document.getElementById('logDate');if(ld)ld.value=new Date().toISOString().slice(0,10);
}

function draftSetStage(v){const prev=draft.stage;draft.stage=v;if(v!==prev)draft.stageEnteredAt=new Date().toISOString();if(v!=='In play'&&v!=='Offer')draft.interviewStage='';renderModal();}
function draftToggle(f){draft[f]=!draft[f];renderModal();}
function draftTogglePriority(p){draft.priority=draft.priority===p?'':p;renderModal();}
function savePerson(){if(!draft.name.trim()){alert('Name is required');return;}const idx=state.people.findIndex(p=>p.id===draft.id);if(idx>=0)state.people[idx]=draft;else{draft.id=Date.now()+'';state.people.unshift(draft);}saveToDrive();closeModal();render();}
function confirmDelete(id){if(!confirm('Delete this person?'))return;state.people=state.people.filter(p=>p.id!==id);saveToDrive();closeModal();render();}
function submitLog(){const el=document.getElementById('logText');const dl=document.getElementById('logDate');if(!el||!el.value.trim())return;const date=dl&&dl.value?new Date(dl.value).toISOString():new Date().toISOString();if(!draft.log)draft.log=[];draft.log.unshift({id:Date.now()+'',type:state.logType||'Note',text:el.value.trim(),date});draft.lastContact=date;const p=state.people.find(x=>x.id===draft.id);if(p){p.log=draft.log;p.lastContact=draft.lastContact;}saveToDrive();renderModal();}
function deleteLog(lid){draft.log=(draft.log||[]).filter(l=>l.id!==lid);const p=state.people.find(x=>x.id===draft.id);if(p)p.log=draft.log;saveToDrive();renderModal();}
function exportCSV(){const headers=['Name','Title','Company','Email','Phone','LinkedIn','Stage','Days in Stage','Interview Stage','Priority','Follow Up','Last Contact','Next Step','Next Step Due','Notes'];const rows=state.people.map(p=>[p.name,p.title,p.company,p.email,p.phone,p.linkedin,p.stage,stageAge(p)??'',p.interviewStage,p.priority,p.followUp?'Yes':'',p.lastContact?new Date(p.lastContact).toLocaleDateString():'',p.nextStepNote,p.nextStepDate?new Date(p.nextStepDate).toLocaleDateString():'',p.notes].map(v=>`"${(v??'').toString().replace(/"/g,'""')}"`).join(','));const csv=[headers.join(','),...rows].join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='executive_pipeline.csv';a.click();}

window.addEventListener('load',()=>{const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.async=true;s.defer=true;s.onload=initGoogle;s.onerror=()=>showAuthError('Failed to load Google sign-in. Check your internet connection.');document.head.appendChild(s);});
</script>
</body>
</html>
